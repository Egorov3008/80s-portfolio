{% extends "base.html" %}

{% block content %}
<section class="projects-full">
    <div class="container">
        <h3 class="section-title">Все Проекты</h3>
        <div class="projects-grid">
            {% for project in config.PROJECTS %}
            <div class="project-card">
                <h3>{{ project.name }}</h3>
                <p>{{ project.description }}</p>
                <div class="project-tech">
                    {% for tech in project.tech %}
                    <span style="display:inline-block; padding: 5px 10px; background: rgba(0,255,255,0.2); border: 1px solid var(--neon-blue); margin: 3px; font-size: 0.8rem;">{{ tech }}</span>
                    {% endfor %}
                </div>
                {% if project.github %}
                <a href="{{ project.github }}" class="btn btn-primary" style="margin-top: 20px;" target="_blank">GitHub ↗</a>
                {% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
